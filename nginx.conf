events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;

    # job-scraper backend
    upstream job_scraper {
        server job-scraper:3333;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── Статичні файли: css, js, images ────────────────────
        location ~* \.(css|js|ico|png|jpg|svg|woff2?)$ {
            proxy_pass http://job_scraper;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
            expires 1h;
            add_header Cache-Control "public";
        }

        # ── SSE endpoint /events ───────────────────────────────
        # SSE вимагає відключити буферизацію відповіді!
        location /events {
            proxy_pass http://job_scraper;
            proxy_http_version 1.1;
            proxy_set_header Connection '';          # keep-alive для upstream
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Критично для SSE: вимикаємо буферизацію
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;              # 24h — SSE тримає з'єднання
            chunked_transfer_encoding on;
        }

        # ── Всі інші запити → job-scraper ─────────────────────
        location / {
            proxy_pass http://job_scraper;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Відповідь не буферуємо (важливо для динамічних сторінок)
            proxy_buffering off;
        }

        # ── Healthcheck ────────────────────────────────────────
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
