# docker-compose.yml — job-scraper + nginx reverse proxy
# Запуск: docker compose up -d --build
# Сайт буде на: http://localhost:8090

services:

  # ── Node.js job-scraper ──────────────────────────────────────
  job-scraper:
    build: .
    container_name: job-scraper
    # Порт 3333 НЕ публікуємо назовні — тільки nginx має доступ всередині мережі
    expose:
      - "3333"
    volumes:
      - scraper_data:/app/data    # SQLite БД зберігається між перезапусками
    environment:
      - PORT=3333
      - SCRAPE_SCHEDULE=0 */3 * * *
      - NODE_ENV=production
      # Авторизація (обов'язково змінити!)
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret-key}
      # Telegram бот (опціонально — залиш порожнім щоб вимкнути)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - APP_URL=${APP_URL:-http://localhost}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: job-scraper-nginx
    ports:
      - "80:80"                 # Сайт: http://163.192.216.12/
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      job-scraper:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  scraper_data:

networks:
  default:
    name: job-scraper-network
